        - heading "四点主要结论" [level=2] [ref=e801]
      - list [ref=e803]:
        - listitem [ref=e804]: 虚实悖论确实存在：AR 在视觉层面赋能的同时，于触觉层面构成相对剥夺，激活而非消解触觉需求。
        - listitem [ref=e805]: 作用机制为一条心理链：由感知落差经触觉渴望至补偿反应，渴望是落差得以行动化的关键接口。
        - listitem [ref=e806]: 两个边界均作用于链条第一阶段：高触摸需求个体、低触觉可及性情境下落差被放大，关键在于"本应可触却不可触"的冲突。
        - listitem [ref=e807]: 补偿动机具有跨产品迁移性：由某一产品激发的触觉渴望可外溢至共享触觉属性的其他产品决策。
      - generic [ref=e808]:
